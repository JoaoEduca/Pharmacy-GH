        <h1 style="text-align: center; margin: 100px;">Crie sua Conta na GH</h1>
        <nav class="formulario">
            <div class="mb-3">
                <label for="formGroupExampleInput" class="form-label">Nome</label>

            </div>

                    <label class="visually-hidden" for="autoSizingSelect">Sexo</label>
                    <select class="form-select" id="autoSizingSelect">
                        <option selected>Selecione...</option>
                        <option value="1">Homem</option>
                        <option value="2">Mulher</option>
                        <option value="3">Outro</option>
                    </select>

                </div>
                <div class="col-sm">
                    <input type="text" class="form-control" placeholder="CPF" aria-label="Zip">

            </div>

            <div class="row">

                <div class="col">
                    <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
                </div>
            </div>
        </nav>
